<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #81c784;
            --dark: #1b5e20;
            --light: #f1f8e9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--light);
            color: #333;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .container {
            max-width: 900px;
            margin: -40px auto 40px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* Seção Interativa (JavaScript manipulando o DOM) */
        .lab-container {
            background: #f9f9f9;
            border: 2px dashed var(--primary);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 30px;
        }

        #status-fazenda {
            font-weight: bold;
            color: #d32f2f;
            font-size: 1.2rem;
        }

        .btn-acao {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-acao:hover { background: var(--dark); }

        .hidden { display: none; }
